# Quality Gates Configuration
# Generated by BMad TEA Agent - Test Architect Module
# Defines quality thresholds and gate rules for Task Tracker

name: Quality Gates

on:
  workflow_call:
    inputs:
      coverage-threshold:
        description: 'Minimum coverage percentage required'
        required: false
        type: string
        default: '80'
      test-threshold:
        description: 'Minimum test pass rate required'
        required: false
        type: string
        default: '100'

jobs:
  quality-check:
    name: Quality Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Determine Go version
        id: go-version
        run: |
          if [ -f go.mod ]; then
            GO_VERSION=$(grep "^go " go.mod | sed 's/go //')
            echo "value=$GO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using Go $GO_VERSION from go.mod"
          else
            echo "value=1.21" >> "$GITHUB_OUTPUT"
            echo "Using default Go 1.21"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.value }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
          TEST_THRESHOLD: ${{ inputs.test-threshold }}
        run: |
          echo "рџљ¦ Quality Gates Validation"
          echo "в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ"
          echo "Coverage Threshold: ${COVERAGE_THRESHOLD}%"
          echo "Test Pass Rate: ${TEST_THRESHOLD}%"
          echo ""

          # Run tests with coverage
          go test -v -race -coverprofile=coverage.out ./...

          # Check coverage
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "рџ“Љ Actual Coverage: ${COVERAGE}%"
            
            # Coverage gate
            if (( $(echo "$COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "вњ… Coverage gate PASSED: ${COVERAGE}% >= ${COVERAGE_THRESHOLD}%"
            else
              echo "вќЊ Coverage gate FAILED: ${COVERAGE}% < ${COVERAGE_THRESHOLD}%"
              exit 1
            fi
          else
            echo "вљ пёЏ No coverage report generated"
            exit 1
          fi

          echo ""
          echo "вњ… All quality gates passed"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-coverage
          path: coverage.out
          retention-days: 30

      - name: Generate coverage badge
        if: success()
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "рџ“€ Coverage: $COVERAGE"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Quality Summary
        run: |
          echo "## рџљ¦ Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Threshold**: ${{ inputs.coverage-threshold }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Pass Rate**: ${{ inputs.test-threshold }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: вњ… PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All quality gates have been successfully passed." >> $GITHUB_STEP_SUMMARY
