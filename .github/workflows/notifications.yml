# Notification Configuration
# Generated by BMad TEA Agent - Test Architect Module
# Configures failure notifications and artifact links

name: Notifications

on:
  workflow_run:
    workflows: ["Test Pipeline"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom notification message'
        required: false
        type: string

jobs:
  notify-on-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 CI Pipeline Failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo ""
          echo "🔗 View details: ${{ github.event.workflow_run.html_url }}"
          echo ""
          echo "📋 Next steps:"
          echo "1. Review the failed workflow logs"
          echo "2. Download test artifacts for debugging"
          echo "3. Fix identified issues"
          echo "4. Re-run the workflow"

      - name: Create issue for tracking
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 CI Pipeline Failure - ${context.sha.substring(0, 7)}`;
            const body = `
            ## CI Pipeline Failure
            
            **Workflow**: ${{ github.event.workflow_run.name }}
            **Branch**: ${{ github.event.workflow_run.head_branch }}
            **Commit**: ${{ github.event.workflow_run.head_sha }}
            **Timestamp**: ${{ github.event.workflow_run.updated_at }}
            
            ### 🔍 Investigation Required
            
            1. [View Workflow Logs](${{ github.event.workflow_run.html_url }})
            2. Download and review test artifacts
            3. Identify root cause of failure
            4. Implement fixes
            5. Re-run workflow to validate
            
            ### 📊 Failure Context
            
            - **Trigger**: ${{ github.event_name }}
            - **Repository**: ${{ github.repository }}
            - **Actor**: ${{ github.actor }}
            
            ---
            *This issue was automatically created by the CI failure notification system*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ci-failure', 'urgent']
            });

  success-summary:
    name: Success Summary
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Success notification
        run: |
          echo "✅ CI Pipeline Succeeded"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Duration: ${{ github.event.workflow_run.updated_at }}"
          echo ""
          echo "🎉 All tests passed and quality gates validated!"
          echo ""
          echo "📦 Available artifacts:"
          echo "- Coverage reports"
          echo "- Test results"
          echo "- Binary builds"

  artifact-links:
    name: Artifact Links
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate artifact summary
        run: |
          echo "## 📦 Available Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Description | Retention |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Reports | Test coverage HTML and data | 30 days |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Results | Detailed test execution logs | 30 days |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Builds | Compiled Go executables | 30 days |" >> $GITHUB_STEP_SUMMARY
          echo "| Burn-in Failures | Flaky test debugging data | 30 days |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download artifacts from the Actions tab**" >> $GITHUB_STEP_SUMMARY
