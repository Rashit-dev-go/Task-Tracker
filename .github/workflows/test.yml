# GitHub Actions CI/CD Pipeline for Test Execution
# Generated by BMad TEA Agent - Test Architect Module
# Optimized for: Parallel Sharding, Burn-In Loop
# Stack: backend | Framework: Go Testing
#
# Variables to customize per project:
#   GO_VERSION        - Go version (from go.mod: 1.21)
#   TEST_CMD          - main test command (go test ./...)
#   LINT_CMD          - lint command (go fmt + go vet)
#   BUILD_CMD         - build command (go build)

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint stage - Code quality checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Determine Go version
        id: go-version
        run: |
          if [ -f go.mod ]; then
            GO_VERSION=$(grep "^go " go.mod | sed 's/go //')
            echo "value=$GO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using Go $GO_VERSION from go.mod"
          else
            echo "value=1.21" >> "$GITHUB_OUTPUT"
            echo "Using default Go 1.21"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.value }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run formatter
        run: go fmt ./...

      - name: Run vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ "$(git diff --name-only)" != "" ]; then
            echo "❌ Code is not formatted. Run 'go fmt ./...'"
            git diff
            exit 1
          fi

  # Test stage - Parallel execution with sharding
  test:
    name: Test (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Determine Go version
        id: go-version
        run: |
          if [ -f go.mod ]; then
            GO_VERSION=$(grep "^go " go.mod | sed 's/go //')
            echo "value=$GO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using Go $GO_VERSION from go.mod"
          else
            echo "value=1.21" >> "$GITHUB_OUTPUT"
            echo "Using default Go 1.21"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.value }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: go build -o build/task-tracker .

      - name: Run tests with coverage (shard ${{ matrix.shard }}/4)
        run: |
          # Security: inputs passed through env: to prevent script injection
          TOTAL_PACKAGES=$(go list ./... | wc -l)
          PACKETS_PER_SHARD=$(( (TOTAL_PACKAGES + 3) / 4 ))
          START=$(( (${{ matrix.shard }} - 1) * PACKETS_PER_SHARD + 1 ))
          END=$(( ${{ matrix.shard }} * PACKETS_PER_SHARD ))
          
          echo "📊 Shard ${{ matrix.shard }}/4: packages $START-$END of $TOTAL_PACKAGES"
          
          PACKAGES=$(go list ./... | sed -n "${START},${END}p")
          if [ -n "$PACKAGES" ]; then
            echo "$PACKAGES" | xargs go test -v -race -coverprofile=coverage-${{ matrix.shard }}.out
          else
            echo "No packages for this shard"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard }}
          path: coverage-${{ matrix.shard }}.out
          retention-days: 30

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: |
            test-results/
          retention-days: 30

  # Build stage - Ensure application builds successfully
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Determine Go version
        id: go-version
        run: |
          if [ -f go.mod ]; then
            GO_VERSION=$(grep "^go " go.mod | sed 's/go //')
            echo "value=$GO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using Go $GO_VERSION from go.mod"
          else
            echo "value=1.21" >> "$GITHUB_OUTPUT"
            echo "Using default Go 1.21"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.value }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: |
          mkdir -p build
          go build -o build/task-tracker .
          
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: task-tracker-binary
          path: build/task-tracker
          retention-days: 30

  # Burn-in stage - Flaky test detection (backend-specific)
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [test, build]
    # Only run burn-in on PRs to main/develop or on schedule
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Determine Go version
        id: go-version
        run: |
          if [ -f go.mod ]; then
            GO_VERSION=$(grep "^go " go.mod | sed 's/go //')
            echo "value=$GO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using Go $GO_VERSION from go.mod"
          else
            echo "value=1.21" >> "$GITHUB_OUTPUT"
            echo "Using default Go 1.21"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.value }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run burn-in loop (10 iterations)
        run: |
          echo "🔥 Starting burn-in loop - detecting flaky tests"
          for i in {1..10}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            go test -v -race ./... || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            *.out
          retention-days: 30

  # Report stage - Aggregate and publish results
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test, build, burn-in]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge coverage reports
        run: |
          echo "📊 Merging coverage reports..."
          go tool covmerge artifacts/coverage-*/coverage-*.out > coverage-combined.out 2>/dev/null || echo "No coverage to merge"
          
          if [ -f coverage-combined.out ]; then
            go tool cover -html=coverage-combined.out -o coverage-combined.html
            echo "✅ Coverage report generated: coverage-combined.html"
          fi

      - name: Generate coverage summary
        if: success()
        run: |
          if [ -f coverage-combined.out ]; then
            COVERAGE=$(go tool cover -func=coverage-combined.out | grep total | awk '{print $3}')
            echo "📊 Total Coverage: $COVERAGE"
            echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total Coverage**: $COVERAGE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Burn-in**: ${{ needs.burn-in.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Shards**: 4" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected** - Review burn-in artifacts" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ **Tests failed** - Review test artifacts" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-combined.html
            coverage-combined.out
          retention-days: 30

# ============================================================================
# EXTENSION PATTERNS — Script Injection Prevention
# ============================================================================
# When extending this template into reusable workflows, manual dispatch
# workflows, or composite actions, NEVER use ${{ inputs.* }} directly in
# run: blocks. Always pass through env: intermediaries.
#
# KEY PRINCIPLE: Inputs must be DATA, not COMMANDS.
# Pass inputs through env: and interpolate as quoted arguments into fixed
# commands. NEVER accept command-shaped inputs (e.g., install-command,
# test-command) that get executed as shell code — even through env:.
#
# Example safe pattern for reusable workflows:
#
# on:
#   workflow_call:
#     inputs:
#       test-shards:
#         description: 'Number of test shards (data only)'
#         type: string
#         required: false
#         default: '4'
#
# jobs:
#   test:
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#       - name: Run tests
#         env:
#           TEST_SHARDS: ${{ inputs.test-shards }}
#         run: |
#           # Security: inputs passed through env: to prevent script injection
#           echo "Running tests with $TEST_SHARDS shards"
#           go test ./...
#
# ❌ NEVER DO THIS:
#   # Direct ${{ inputs.* }} in run: — GitHub expression injection
#   - run: go test ./... -shards=${{ inputs.test-shards }}
#
#   # Executing input-derived env var as a command — still command injection
#   - env:
#       CMD: ${{ inputs.test-command }}
#     run: $CMD
# ============================================================================
